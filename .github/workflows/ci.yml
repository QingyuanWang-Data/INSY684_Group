name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --all-groups --locked --python ${{ matrix.python-version }}

      - name: Ruff
        run: uv run ruff check .

      - name: Type check
        run: uv run ty check src tests

      - name: Tests
        run: uv run pytest

      - name: Governance report smoke test
        run: uv run generate-governance-reports --artifact-dir artifacts --docs-dir docs
